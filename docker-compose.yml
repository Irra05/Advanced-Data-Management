version: "3.9"

services:
  timeseries-db:
    image: cassandra:4.1
    container_name: gridsense_cassandra
    restart: unless-stopped
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: "GridSenseCluster"
      CASSANDRA_DC: "dc1"
      HEAP_NEWSIZE: "128M"
      MAX_HEAP_SIZE: "512M"
    volumes:
      - cassandra_data:/var/lib/cassandra
      - ./cql/init.cql:/docker-entrypoint-initdb.d/init.cql
    healthcheck:
      test: ["CMD-SHELL", "nodetool status | grep -q '^UN'"]
      interval: 30s
      timeout: 10s
      retries: 10
  
  graph-db:
    image: neo4j:5-community
    container_name: gridsense_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474" # Browser UI
      - "7687:7687" # Bolt protocol
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_max__size: "512M"
    volumes:
      - neo4j_data:/data
      - ./neo4j/import:/import
    healthcheck:
      test: ["CMD", "wget", "-O", "/dev/null", "http://localhost:7474"]
      interval: 20s
      timeout: 5s
      retries: 8

# ── remaining services: add catalog-db, billing-db, cache, api ──

volumes:
  cassandra_data:
  neo4j_data:
  # add: mongo_data, pg_data, redis_data

networks:
  default:
    name: gridsense_net
